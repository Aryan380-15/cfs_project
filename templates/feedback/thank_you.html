{% extends "base.html" %}
{% block title %}Thank You{% endblock %}

{% block content %}
<div class="d-flex justify-content-center">
  <div class="glass-card p-5 text-center" style="max-width: 500px;">
    <i class="bi bi-check-circle-fill" style="font-size: 3rem; color: var(--success);"></i>
    <h4 class="brand-font mt-3">Feedback Submitted</h4>
    <p class="text-muted">
      Thank you for your honest and anonymous feedback. It has been
      recorded and cannot be traced back to you.
    </p>
    <div class="d-flex gap-2 justify-content-center mt-4">
      <a href="{% url 'students:teacher_list' %}" class="btn btn-gradient">
        Back to My Teachers
      </a>
      <a href="{% url 'feedback:my_feedback' %}" class="btn btn-outline-light">
        View My Submissions
      </a>
    </div>
  </div>
</div>
{% endblock %}
