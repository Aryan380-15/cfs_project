{% extends "base.html" %}
{% block title %}Student Dashboard{% endblock %}

{% block content %}
<h3 class="brand-font mb-1">Welcome, {{ user.username }}</h3>
<p class="text-muted mb-4">Track your feedback progress below. All submissions are anonymous.</p>

<div class="glass-card p-4 d-flex justify-content-between align-items-center">
  <div>
    <h5 class="mb-1"><i class="bi bi-pencil-square"></i> Give Feedback</h5>
    <p class="text-muted small mb-0">Rate your assigned teachers for the active session.</p>
  </div>
  <a href="{% url 'students:teacher_list' %}" class="btn btn-gradient">Go</a>
</div>
{% endblock %}
